<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>לומדים אנגלית! 🌟</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body { font-family: 'Segoe UI', Arial, sans-serif; min-height: 100vh; background: var(--bg, #1a0030); color: #fff; }
    #app { max-width: 640px; margin: 0 auto; min-height: 100vh; padding: 0 12px 80px; }

    /* Themes */
    .theme-beginner { --bg:#4a1060; --primary:#7b2d8b; --accent:#9c4dcc; --btn:#6c3483; }
    .theme-advanced { --bg:#4a0a1a; --primary:#6b1a3a; --accent:#8b2252; --btn:#7b1a3a; }

    /* Buttons */
    .btn { padding: 12px 20px; border: none; border-radius: 12px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: all 0.2s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-secondary { background: rgba(255,255,255,0.15); color: #fff; }
    .btn-active { background: #fff; color: var(--primary); }

    /* Home */
    .home-header { text-align: center; padding: 24px 0 16px; }
    .home-header h1 { font-size: 2rem; }
    .level-toggle { display: flex; gap: 8px; justify-content: center; margin-top: 12px; }
    .alphabet-btn-wrap { text-align: center; margin: 12px 0; }
    .units-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-top: 16px; }
    .unit-card { background: rgba(255,255,255,0.1); border-radius: 16px; padding: 16px 12px; cursor: pointer; text-align: center; transition: all 0.2s; position: relative; }
    .unit-card:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }
    .unit-emoji { font-size: 2.5rem; }
    .unit-title { font-size: 0.9rem; font-weight: bold; margin: 8px 0 4px; }
    .unit-stars { font-size: 1.1rem; margin: 4px 0; }
    .unit-progress { height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; overflow: hidden; margin-top: 6px; }
    .unit-progress-fill { height: 100%; background: #ffd700; border-radius: 3px; transition: width 0.3s; }
    .unit-check { position: absolute; top: 8px; left: 8px; color: #4caf50; font-size: 1.2rem; font-weight: bold; }
    .total-stars-bar { text-align: center; padding: 16px; font-size: 1.1rem; }
    .reset-btn-wrap { text-align: center; padding: 8px; }
    .reset-btn { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.4); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; }
    .reset-btn:hover { color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.4); }

    /* Unit screen */
    .unit-header { display: flex; align-items: center; padding: 16px 0; gap: 12px; }
    .unit-header h2 { font-size: 1.3rem; flex: 1; }
    .back-btn { background: rgba(255,255,255,0.15); border: none; color: #fff; padding: 8px 14px; border-radius: 10px; cursor: pointer; font-size: 1rem; }
    .tab-bar { display: flex; gap: 6px; margin-bottom: 16px; }
    .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 10px; cursor: pointer; font-size: 0.9rem; font-weight: bold; background: rgba(255,255,255,0.1); color: #fff; transition: all 0.2s; }
    .tab-btn.active { background: #fff; color: var(--primary, #6c3483); }

    /* Flashcard */
    .flashcard { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 24px; text-align: center; }
    .card-emoji { font-size: 4rem; margin-bottom: 12px; }
    .card-en { font-size: 2rem; font-weight: bold; direction: ltr; margin-bottom: 4px; }
    .card-translit { color: rgba(255,255,255,0.6); font-size: 0.9rem; margin-bottom: 12px; direction: ltr; }
    .card-he { font-size: 1.5rem; color: #ffd700; margin: 12px 0; animation: fadeIn 0.3s; }
    .flip-btn { background: var(--accent); color: #fff; border: none; padding: 10px 24px; border-radius: 12px; cursor: pointer; font-size: 1rem; margin: 8px 0; }
    .speak-btn { background: rgba(255,255,255,0.15); border: none; color: #fff; padding: 8px 16px; border-radius: 10px; cursor: pointer; font-size: 1.2rem; }
    .nav-row { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; }
    .nav-btn { background: rgba(255,255,255,0.15); border: none; color: #fff; padding: 8px 16px; border-radius: 10px; cursor: pointer; font-size: 1.2rem; }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }
    .dots { display: flex; gap: 6px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.3); }
    .dot.active { background: #ffd700; }

    /* Match game */
    .match-question { text-align: center; padding: 16px; }
    .match-prompt { font-size: 2.5rem; margin-bottom: 8px; }
    .match-he { font-size: 1.3rem; color: #ffd700; margin-bottom: 16px; direction: rtl; }
    .match-en { font-size: 1.3rem; margin-bottom: 16px; direction: ltr; }
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .option-btn { padding: 14px; border: 2px solid rgba(255,255,255,0.2); border-radius: 12px; background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; font-size: 1rem; font-weight: bold; direction: ltr; transition: all 0.2s; }
    .option-btn:hover { background: rgba(255,255,255,0.2); }
    .option-btn.correct { background: #4caf50 !important; border-color: #4caf50 !important; animation: pulse 0.3s; }
    .option-btn.wrong { background: #f44336 !important; border-color: #f44336 !important; animation: shake 0.3s; }
    .match-score { text-align: center; padding: 8px; color: rgba(255,255,255,0.7); }
    .match-progress { text-align: center; font-size: 0.9rem; color: rgba(255,255,255,0.5); margin-bottom: 8px; }

    /* Quiz */
    .quiz-word-display { text-align: center; padding: 20px; }
    .quiz-word { font-size: 2.5rem; font-weight: bold; direction: ltr; letter-spacing: 8px; margin: 12px 0; }
    .quiz-prompt-he { font-size: 1.3rem; color: #ffd700; direction: rtl; margin: 8px 0; }
    .quiz-letters { direction: ltr; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 16px; }
    .letter-option { background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3); color: #fff; width: 60px; height: 60px; border-radius: 12px; font-size: 1.8rem; font-weight: bold; cursor: pointer; direction: ltr; transition: all 0.2s; }
    .letter-option:hover { background: rgba(255,255,255,0.25); }
    .letter-option.correct { background: #4caf50; border-color: #4caf50; }
    .letter-option.wrong { background: #f44336; border-color: #f44336; animation: shake 0.3s; }
    .quiz-sentence-options { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 16px; }
    .quiz-sentence-opt { padding: 12px 16px; border: 2px solid rgba(255,255,255,0.2); border-radius: 12px; background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; font-size: 0.95rem; text-align: right; transition: all 0.2s; }
    .quiz-sentence-opt[dir='ltr'] { text-align: left; }
    .quiz-sentence-opt.correct { background: #4caf50 !important; border-color: #4caf50 !important; }
    .quiz-sentence-opt.wrong { background: #f44336 !important; border-color: #f44336 !important; animation: shake 0.3s; }

    /* Results */
    .results-screen { text-align: center; padding: 32px 16px; animation: popIn 0.4s; }
    .result-stars { font-size: 3rem; margin: 16px 0; }
    .result-score { font-size: 1.3rem; margin: 8px 0; }
    .result-message { font-size: 1.1rem; color: rgba(255,255,255,0.8); margin: 8px 0; }
    .result-btns { display: flex; gap: 10px; justify-content: center; margin-top: 24px; flex-wrap: wrap; }

    /* Alphabet */
    .alphabet-header { display: flex; align-items: center; padding: 16px 0; gap: 12px; }
    .alphabet-header h2 { font-size: 1.3rem; }
    .alphabet-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
    .letter-card { background: rgba(255,255,255,0.1); border-radius: 14px; padding: 12px 8px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .letter-card:hover { background: rgba(255,255,255,0.2); }
    .letter-card.vowel { background: rgba(255,215,0,0.2); border: 2px solid rgba(255,215,0,0.4); }
    .letter-card.vowel:hover { background: rgba(255,215,0,0.3); }
    .letter-card.pulse-anim { animation: pulse 0.4s; }
    .big-letter { font-size: 1.8rem; font-weight: bold; direction: ltr; color: #ffd700; }
    .letter-emoji { font-size: 1.5rem; margin: 4px 0; }
    .letter-word { font-size: 0.8rem; direction: ltr; color: rgba(255,255,255,0.9); }
    .letter-translit { font-size: 0.75rem; color: rgba(255,255,255,0.6); margin-top: 2px; }

    /* Reading */
    .reading-passage { background: rgba(255,255,255,0.1); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
    .reading-title { font-size: 1.3rem; font-weight: bold; direction: ltr; margin-bottom: 12px; color: #ffd700; }
    .reading-text { direction: ltr; line-height: 1.8; font-size: 1rem; color: rgba(255,255,255,0.9); }
    .reading-question { font-size: 1.1rem; margin-bottom: 16px; }
    .passage-selector { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .passage-btn { padding: 8px 14px; border-radius: 10px; border: 2px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; font-size: 0.85rem; }
    .passage-btn.active { border-color: #ffd700; color: #ffd700; }

    /* Confetti */
    .confetti-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
    .confetti-piece { position: absolute; width: 10px; height: 10px; border-radius: 2px; animation: fall linear forwards; }

    /* Celebration modal */
    .celebration-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .celebration-modal { background: var(--primary, #6c3483); border-radius: 24px; padding: 40px 32px; text-align: center; max-width: 320px; width: 90%; animation: popIn 0.4s; }
    .celebration-modal h2 { font-size: 1.8rem; margin-bottom: 12px; }
    .celebration-stars { font-size: 3rem; margin: 12px 0; }
    .celebration-msg { font-size: 1.1rem; color: rgba(255,255,255,0.85); margin-bottom: 20px; }

    /* Animations */
    @keyframes fall { from { top: -20px; opacity: 1; } to { top: 110vh; opacity: 0; } }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
    @keyframes popIn { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  </style>

    // ===================== HELPERS =====================

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function speak(text, lang='en-US') {
      if (!window.speechSynthesis) return;
      const utt = new SpeechSynthesisUtterance(text);
      utt.lang = lang;
      utt.rate = 0.8;
      speechSynthesis.cancel();
      speechSynthesis.speak(utt);
    }

    function getUnits() {
      return state.level === 'beginner' ? beginnerUnits : advancedUnits;

    function getUnit(id) {
      return getUnits().find(u => u.id === id);

    function getProgress(unitId) {
      return state.progress[unitId] || { stars: 0, matchDone: false, quizDone: false };
    }

    function updateProgress(unitId, key, val) {
      if (!state.progress[unitId]) state.progress[unitId] = { stars: 0, matchDone: false, quizDone: false };
      if (key === 'stars') {
        state.progress[unitId].stars = Math.max(state.progress[unitId].stars, val);
      } else {
        state.progress[unitId][key] = val;
      }
      saveProgress();
    }

    function loadProgress() {
      try {
        const d = JSON.parse(localStorage.getItem('englishApp_v1') || '{}');
        state.progress = d.progress || {};
      } catch(e) { state.progress = {}; }
    }

    function saveProgress() {
      localStorage.setItem('englishApp_v1', JSON.stringify({ version: 1, progress: state.progress }));

    function starsHtml(n, max=3) {
      let s = '';
      for (let i = 0; i < max; i++) s += i < n ? '★' : '☆';
      return s;
    }

      for (let i = 0; i < 55; i++) {
        const p = document.createElement('div');
        p.className = 'confetti-piece';
        p.style.cssText = `left:${Math.random()*100}%;background:${colors[i%colors.length]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;animation-delay:${Math.random()*1.5}s;animation-duration:${2.5+Math.random()*2}s`;
        container.appendChild(p);
      }
      document.body.appendChild(container);
      setTimeout(() => container.remove(), 5000);
    }

    // ===================== GAME SETUP =====================

    function buildMatchQuestions(unit) {
      if (unit.mode === 'reading') return [];
      const words = unit.words;
      const shuffled = shuffle(words);
      return shuffled.map(word => {
        const wrong = shuffle(words.filter(w => w !== word)).slice(0, 3);
        const opts = shuffle([word, ...wrong]);
        return { word, opts };
      });
    }

    function buildQuizQuestions(unit) {
      if (unit.mode === 'reading') return [];
      const words = unit.words;
      const shuffled = shuffle(words);
      return shuffled.map(word => {
        if ((unit.mode === 'heToEn') && word.en.length >= 3) {
          const letters = word.en.toUpperCase().split('');
          const hideIdx = Math.floor(Math.random() * letters.length);
          const correctLetter = letters[hideIdx];
          const allLetters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
          const wrongLetters = shuffle(allLetters.filter(l => l !== correctLetter)).slice(0, 3);
          const letterOpts = shuffle([correctLetter, ...wrongLetters]);
          return { type: 'letter', word, hideIdx, correctLetter, letterOpts };
        } else {
          const wrong = shuffle(words.filter(w => w !== word)).slice(0, 3);
          const opts = shuffle([word, ...wrong]);
          return { type: 'sentence', word, opts };
        }
      });
    }

      let html = '';
      if (state.screen === 'home') {
        html = renderHome(theme);
      } else if (state.screen === 'unit') {
        html = renderUnit(theme);
      } else if (state.screen === 'alphabet') {
        html = renderAlphabet(theme);
      }
      app.innerHTML = html;
    }

            <h1>🌟 לומדים אנגלית!</h1>
            <div class="level-toggle">
              <button class="btn ${state.level === 'beginner' ? 'btn-active' : 'btn-secondary'}" data-action="setLevel" data-level="beginner">🌱 מתחילים</button>
              <button class="btn ${state.level === 'advanced' ? 'btn-active' : 'btn-secondary'}" data-action="setLevel" data-level="advanced">🚀 מתקדמים</button>
            </div>
          </div>
          <div class="alphabet-btn-wrap">
            <button class="btn btn-secondary" data-action="openAlphabet">🔤 האלפבית האנגלי</button>
          </div>
          <div class="units-grid">
            ${unitCards}
          </div>
          <div class="total-stars-bar">
            ⭐ ${totalStars} / ${totalPossible} כוכבים
          </div>
          <div class="reset-btn-wrap">
            <button class="reset-btn" data-action="resetProgress">🗑️ איפוס התקדמות</button>
          </div>
        </div>`;
    }

    function renderUnit(theme) {
      const unit = getUnit(state.unitId);
      if (!unit) return '';

      const tabs = unit.mode === 'reading'
        ? [['learn','📖 קריאה'],['quiz','❓ שאלות']]
        : [['learn','📚 למידה'],['match','🎯 התאמה'],['quiz','✏️ חידון']];

      const tabBar = tabs.map(([id, label]) =>
        `<button class="tab-btn ${state.tab === id ? 'active' : ''}" data-action="setTab" data-tab="${id}">${label}</button>`
      ).join('');

      let content = '';
      if (state.tab === 'learn') content = renderLearn(unit);
      else if (state.tab === 'match') content = renderMatch(unit);
      else if (state.tab === 'quiz') content = renderQuiz(unit);

      return `
        <div class="${theme}">
          <div class="unit-header">
            <button class="back-btn" data-action="goHome">← חזרה</button>
            <h2>${unit.emoji} ${unit.title}</h2>
          </div>
          <div class="tab-bar">${tabBar}</div>
          ${content}
        </div>`;
    }

    function renderLearn(unit) {
      if (unit.mode === 'reading') {
        const passages = unit.passages || [];
        const idx = state.readingPassage || 0;
        const passage = passages[idx];
        if (!passage) return '<p style="text-align:center;padding:20px">אין קטעי קריאה</p>';

        const selectorBtns = passages.map((p, i) =>
          `<button class="passage-btn ${i === idx ? 'active' : ''}" data-action="selectPassage" data-idx="${i}">${p.title}</button>`
        ).join('');

        return `
          <div>
            <div class="passage-selector">${selectorBtns}</div>
            <div class="reading-passage">
              <div class="reading-title">${passage.title}</div>
              <div class="reading-text">${passage.text}</div>
            </div>
          </div>`;
      }

      const words = unit.words;
      const idx = state.cardIndex;
      const word = words[idx];
      const dots = words.map((_, i) =>
        `<div class="dot ${i === idx ? 'active' : ''}"></div>`
      ).join('');

      return `
        <div>
          <div class="flashcard">
            <div class="card-emoji">${word.e}</div>
            <div class="card-en" dir="ltr">${word.en}</div>
            ${word.t ? `<div class="card-translit" dir="ltr">/${word.t}/</div>` : ''}
            ${state.cardFlipped
              ? `<div class="card-he">${word.he}</div>
                 <button class="speak-btn" data-action="speakWord" data-text="${word.en}">🔊 הקשב</button>`
              : `<button class="flip-btn" data-action="flipCard">הצג תרגום</button>`
            }
          </div>
          <div class="nav-row">
            <button class="nav-btn" data-action="prevCard" ${idx === 0 ? 'disabled' : ''}>←</button>
            <div class="dots">${dots}</div>
            <button class="nav-btn" data-action="nextCard" ${idx === words.length - 1 ? 'disabled' : ''}>→</button>
          </div>
          <p style="text-align:center;color:rgba(255,255,255,0.5);font-size:0.85rem;margin-top:8px">${idx+1} / ${words.length}</p>
        </div>`;
    }

    function renderMatch(unit) {
      if (state.matchDone) {
        const score = state.matchScore;
        const total = state.matchQuestions.length;
        const pct = score / total;
        const stars = pct === 1 ? 3 : pct >= 0.7 ? 2 : pct >= 0.5 ? 1 : 0;
        const msgs = ['נסה שוב 💪','כמעט! 👍','יופי! 🎉','מושלם! 🌟'];
        return `
          <div class="results-screen">
            <h2>🎯 סיום התאמה!</h2>
            <div class="result-stars" style="color:#ffd700">${starsHtml(stars)}</div>
            <div class="result-score">${score} / ${total} נכון</div>
            <div class="result-message">${msgs[stars]}</div>
            <div class="result-btns">
              <button class="btn btn-secondary" data-action="setTab" data-tab="match">שחק שוב</button>
              <button class="btn btn-primary" data-action="setTab" data-tab="quiz">לחידון ✏️</button>
            </div>
          </div>`;
      }

      const q = state.matchQuestions[state.matchQ];
      if (!q) return '';
      const total = state.matchQuestions.length;

      let prompt = '';
      let optDir = 'ltr';
      if (unit.mode === 'heToEn') {
        prompt = `<div class="match-prompt">${q.word.e}</div><div class="match-he">${q.word.he}</div>`;
        optDir = 'ltr';
      } else {
        prompt = `<div class="match-prompt">${q.word.e}</div><div class="match-en" dir="ltr">${q.word.en}</div>`;
        optDir = 'rtl';
      }

      const opts = q.opts.map((opt, i) => {
        const label = unit.mode === 'heToEn' ? opt.en : opt.he;
        return `<button class="option-btn" dir="${optDir}" data-action="matchAnswer" data-idx="${i}">${label}</button>`;
      }).join('');

      return `
        <div>
          <div class="match-progress">שאלה ${state.matchQ + 1} / ${total}</div>
          <div class="match-score">✅ ${state.matchScore} נכון</div>
          <div class="match-question">
            ${prompt}
            <div class="options-grid">${opts}</div>
          </div>
        </div>`;
    }

    function renderQuiz(unit) {
      if (unit.mode === 'reading') {
        return renderReadingQuiz(unit);
      }

      if (state.quizDone) {
        const score = state.quizScore;
        const total = state.quizQuestions.length;
        const pct = score / total;
        const stars = pct === 1 ? 3 : pct >= 0.75 ? 2 : pct >= 0.5 ? 1 : 0;
        const msgs = ['נסה שוב 💪','יפה! 👍','כל הכבוד! 🎉','מושלם! 🌟'];
        return `
          <div class="results-screen">
            <h2>✏️ סיום חידון!</h2>
            <div class="result-stars" style="color:#ffd700">${starsHtml(stars)}</div>
            <div class="result-score">${score} / ${total} נכון</div>
            <div class="result-message">${msgs[stars]}</div>
            <div class="result-btns">
              <button class="btn btn-secondary" data-action="setTab" data-tab="quiz">שחק שוב</button>
              <button class="btn btn-primary" data-action="goHome">🏠 בחר יחידה</button>
            </div>
          </div>`;
      }

      const q = state.quizQuestions[state.quizQ];
      if (!q) return '';
      const total = state.quizQuestions.length;

      if (q.type === 'letter') {
        const letters = q.word.en.toUpperCase().split('');
        const display = letters.map((l, i) =>
          i === q.hideIdx ? '<span style="color:#ffd700;border-bottom:3px solid #ffd700;min-width:24px;display:inline-block;text-align:center">_</span>' : l
        ).join('');
        const opts = q.letterOpts.map((l, i) =>
          `<button class="letter-option" data-action="quizAnswer" data-idx="${i}">${l}</button>`
        ).join('');
        return `
          <div>
            <div class="match-progress">שאלה ${state.quizQ + 1} / ${total}</div>
            <div class="match-score">✅ ${state.quizScore} נכון</div>
            <div class="quiz-word-display">
              <div class="quiz-prompt-he">${q.word.he}</div>
              <div class="card-emoji">${q.word.e}</div>
              <div class="quiz-word" dir="ltr">${display}</div>
              <p style="color:rgba(255,255,255,0.5);font-size:0.85rem">השלם את האות החסרה</p>
            </div>
            <div class="quiz-letters">${opts}</div>
          </div>`;
      } else {
        const isEnToHe = unit.mode === 'enToHe';
        const questionText = isEnToHe ? q.word.en : q.word.he;
        const questionDir = isEnToHe ? 'ltr' : 'rtl';
        const opts = q.opts.map((opt, i) => {
          const label = isEnToHe ? opt.he : opt.en;
          const dir = isEnToHe ? 'rtl' : 'ltr';
          return `<button class="quiz-sentence-opt" dir="${dir}" data-action="quizAnswer" data-idx="${i}">${label}</button>`;
        }).join('');
        return `
          <div>
            <div class="match-progress">שאלה ${state.quizQ + 1} / ${total}</div>
            <div class="match-score">✅ ${state.quizScore} נכון</div>
            <div class="quiz-word-display">
              <div class="card-emoji">${q.word.e}</div>
              <div style="font-size:1.4rem;margin:12px 0;color:#ffd700" dir="${questionDir}">${questionText}</div>
              <p style="color:rgba(255,255,255,0.5);font-size:0.85rem">${isEnToHe ? 'מה התרגום לעברית?' : 'מה התרגום לאנגלית?'}</p>
            </div>
            <div class="quiz-sentence-options">${opts}</div>
          </div>`;
      }
    }

    function renderReadingQuiz(unit) {
      const passages = unit.passages || [];
      const pIdx = state.readingPassage || 0;
      const passage = passages[pIdx];
      if (!passage) return '<p style="text-align:center;padding:20px">אין שאלות</p>';

      const allQs = [];
      passages.forEach((p, pi) => {
        p.questions.forEach((q, qi) => allQs.push({ ...q, pi, qi, passageTitle: p.title }));
      });

      if (state.readingDone) {
        const score = state.readingScore;
        const total = allQs.length;
        const pct = score / total;
        const stars = pct === 1 ? 3 : pct >= 0.67 ? 2 : pct >= 0.33 ? 1 : 0;
        const msgs = ['נסה שוב 💪','יפה! 👍','כל הכבוד! 🎉','מושלם! 🌟'];
        return `
          <div class="results-screen">
            <h2>📖 סיום קריאה!</h2>
            <div class="result-stars" style="color:#ffd700">${starsHtml(stars)}</div>
            <div class="result-score">${score} / ${total} נכון</div>
            <div class="result-message">${msgs[stars]}</div>
            <div class="result-btns">
              <button class="btn btn-secondary" data-action="resetReading">שחק שוב</button>
              <button class="btn btn-primary" data-action="goHome">🏠 בחר יחידה</button>
            </div>
          </div>`;
      }

      const qIdx = state.readingQ || 0;
      const q = allQs[qIdx];
      if (!q) return '';

      const selectorBtns = passages.map((p, i) =>
        `<button class="passage-btn ${i === pIdx ? 'active' : ''}" data-action="selectPassage" data-idx="${i}">${p.title}</button>`
      ).join('');

      const opts = q.opts.map((opt, i) => {
        const cls = state.readingAnswered
          ? (i === q.correct ? 'correct' : (i === state.readingSelected ? 'wrong' : ''))
          : '';
        return `<button class="quiz-sentence-opt ${cls}" data-action="readingAnswer" data-idx="${i}">${opt}</button>`;
      }).join('');

      return `
        <div>
          <div class="passage-selector">${selectorBtns}</div>
          <div class="reading-passage">
            <div class="reading-title">${passages[q.pi].title}</div>
            <div class="reading-text">${passages[q.pi].text}</div>
          </div>
          <div class="match-progress">שאלה ${qIdx + 1} / ${allQs.length}</div>
          <div class="match-score">✅ ${state.readingScore} נכון</div>
          <div class="reading-question">${q.q}</div>
          <div class="quiz-sentence-options">${opts}</div>
        </div>`;
    }

    function renderAlphabet(theme) {
      const cards = alphabet.map(item => `
        <div class="letter-card ${vowels.has(item.l) ? 'vowel' : ''}" data-action="sayLetter" data-letter="${item.l}" data-word="${item.w}">
          <div class="big-letter">${item.l}</div>
          <div class="letter-emoji">${item.e}</div>
          <div class="letter-word">${item.w}</div>
          <div class="letter-translit">${item.t}</div>
        </div>`
      ).join('');

      return `
        <div class="${theme}">
          <div class="alphabet-header">
            <button class="back-btn" data-action="goHome">← חזרה</button>
            <h2>🔤 האלפבית האנגלי</h2>
          </div>
          <p style="text-align:center;color:rgba(255,255,255,0.6);font-size:0.85rem;margin-bottom:12px">לחץ על אות כדי לשמוע אותה</p>
          <div class="alphabet-grid">${cards}</div>
        </div>`;
    }

    // ===================== HANDLE ACTION =====================

    function handleAction(action, data, e) {
      switch(action) {
        case 'setLevel':
          state.level = data.level;
          render();
          break;

        case 'openUnit': {
          const unit = getUnits().find(u => u.id === data.unitId);
          if (!unit) return;
          state.unitId = data.unitId;
          state.tab = 'learn';
          state.cardIndex = 0;
          state.cardFlipped = false;
          state.matchQuestions = buildMatchQuestions(unit);
          state.matchQ = 0; state.matchScore = 0; state.matchDone = false;
          state.quizQuestions = buildQuizQuestions(unit);
          state.quizQ = 0; state.quizScore = 0; state.quizDone = false;
          state.readingPassage = 0; state.readingQ = 0; state.readingScore = 0;
          state.readingDone = false; state.readingAnswered = false;
          state.screen = 'unit';
          render();
          break;
        }

        case 'openAlphabet':
          state.screen = 'alphabet';
          render();
          break;

        case 'goHome':
          state.screen = 'home';
          render();
          break;

        case 'setTab':
          state.tab = data.tab;
          if (data.tab === 'match') {
            const u = getUnit(state.unitId);
            state.matchQuestions = buildMatchQuestions(u);
            state.matchQ = 0; state.matchScore = 0; state.matchDone = false;
          }
          if (data.tab === 'quiz') {
            const u = getUnit(state.unitId);
            state.quizQuestions = buildQuizQuestions(u);
            state.quizQ = 0; state.quizScore = 0; state.quizDone = false;
            state.readingQ = 0; state.readingScore = 0; state.readingDone = false; state.readingAnswered = false;
          }
          render();
          break;

        case 'nextCard':
          state.cardIndex++;
          state.cardFlipped = false;
          render();
          break;

        case 'prevCard':
          state.cardIndex--;
          state.cardFlipped = false;
          render();
          break;

        case 'flipCard': {
          state.cardFlipped = true;
          const w = getUnit(state.unitId).words[state.cardIndex];
          speak(w.en);
          render();
          break;
        }

        case 'speakWord':
          speak(data.text);
          break;

        case 'matchAnswer':
          handleMatchAnswer(parseInt(data.idx));
          break;

        case 'quizAnswer':
          handleQuizAnswer(parseInt(data.idx));
          break;

        case 'readingAnswer':
          handleReadingAnswer(parseInt(data.idx));
          break;

        case 'resetReading':
          state.readingQ = 0; state.readingScore = 0; state.readingDone = false; state.readingAnswered = false;
          render();
          break;

        case 'sayLetter': {
          const card = e.target.closest('.letter-card');
          if (card) {
            card.classList.add('pulse-anim');
            setTimeout(() => card.classList.remove('pulse-anim'), 400);
          }
          const u1 = new SpeechSynthesisUtterance(data.letter);
          u1.lang = 'en-US'; u1.rate = 0.8;
          speechSynthesis.cancel();
          speechSynthesis.speak(u1);
          setTimeout(() => {
            const u2 = new SpeechSynthesisUtterance(data.word);
            u2.lang = 'en-US'; u2.rate = 0.8;
            speechSynthesis.speak(u2);
          }, 900);
          break;
        }

        case 'selectPassage':
          state.readingPassage = parseInt(data.idx);
          render();
          break;

        case 'resetProgress':
          if (confirm('למחוק את כל ההתקדמות?')) {
            localStorage.removeItem('englishApp_v1');
            state.progress = {};
            state.screen = 'home';
            render();
          }
          break;
      }
    }

    function handleMatchAnswer(idx) {
      const q = state.matchQuestions[state.matchQ];
      const chosen = q.opts[idx];
      const isCorrect = chosen === q.word;
      if (isCorrect) state.matchScore++;

      const app = document.getElementById('app');
      const buttons = app.querySelectorAll('.option-btn');
      buttons.forEach((btn, i) => {
        btn.disabled = true;
        if (q.opts[i] === q.word) btn.classList.add('correct');
        else if (i === idx) btn.classList.add('wrong');
      });

      setTimeout(() => {
        state.matchQ++;
        if (state.matchQ >= state.matchQuestions.length) {
          state.matchDone = true;
          updateProgress(state.unitId, 'matchDone', true);
        }
        render();
      }, 900);
    }

    function handleQuizAnswer(idx) {
      const q = state.quizQuestions[state.quizQ];
      const app = document.getElementById('app');
      let isCorrect = false;

      if (q.type === 'letter') {
        const chosen = q.letterOpts[idx];
        isCorrect = chosen === q.correctLetter;
        const buttons = app.querySelectorAll('.letter-option');
        buttons.forEach((btn, i) => {
          btn.disabled = true;
          if (q.letterOpts[i] === q.correctLetter) btn.classList.add('correct');
          else if (i === idx) btn.classList.add('wrong');
        });
      } else {
        const chosen = q.opts[idx];
        isCorrect = chosen === q.word;
        const buttons = app.querySelectorAll('.quiz-sentence-opt');
        buttons.forEach((btn, i) => {
          btn.disabled = true;
          if (q.opts[i] === q.word) btn.classList.add('correct');
          else if (i === idx) btn.classList.add('wrong');
        });
      }

      if (isCorrect) state.quizScore++;

      setTimeout(() => {
        state.quizQ++;
        if (state.quizQ >= state.quizQuestions.length) {
          state.quizDone = true;
          const pct = state.quizScore / state.quizQuestions.length;
          const stars = pct === 1 ? 3 : pct >= 0.75 ? 2 : pct >= 0.5 ? 1 : 0;
          updateProgress(state.unitId, 'quizDone', true);
          updateProgress(state.unitId, 'stars', stars);
          if (stars > 0) setTimeout(showConfetti, 300);
        }
        render();
      }, 900);
    }

    function handleReadingAnswer(idx) {
      if (state.readingAnswered) return;
      const passages = getUnit(state.unitId).passages || [];
      const allQs = [];
      passages.forEach((p, pi) => {
        p.questions.forEach((q, qi) => allQs.push({ ...q, pi, qi }));
      });
      const q = allQs[state.readingQ];
      if (!q) return;

      state.readingAnswered = true;
      state.readingSelected = idx;

      const isCorrect = idx === q.correct;
      if (isCorrect) state.readingScore++;

      const app = document.getElementById('app');
      const buttons = app.querySelectorAll('.quiz-sentence-opt');
      buttons.forEach((btn, i) => {
        btn.disabled = true;
        if (i === q.correct) btn.classList.add('correct');
        else if (i === idx) btn.classList.add('wrong');
      });

      setTimeout(() => {
        state.readingQ++;
        state.readingAnswered = false;
        if (state.readingQ >= allQs.length) {
          state.readingDone = true;
          const pct = state.readingScore / allQs.length;
          const stars = pct === 1 ? 3 : pct >= 0.67 ? 2 : pct >= 0.33 ? 1 : 0;
          updateProgress(state.unitId, 'quizDone', true);
          updateProgress(state.unitId, 'stars', stars);
          if (stars > 0) setTimeout(showConfetti, 300);
        }
        render();
      }, 900);
    }

    // ===================== INIT =====================

    loadProgress();
    render();

    document.getElementById('app').addEventListener('click', e => {
      const el = e.target.closest('[data-action]');
      if (!el) return;
      const d = el.dataset;
      handleAction(d.action, d, e);
    });
  </script>
</body>
</html>
