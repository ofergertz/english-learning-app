<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;min-height:100vh;background:#1a0030;color:#fff}
#app{max-width:640px;margin:0 auto;min-height:100vh;padding:0 12px 60px}
.btn{padding:11px 18px;border:none;border-radius:11px;cursor:pointer;font-size:.95rem;font-weight:700;transition:all .2s}
.btn-primary{background:var(--accent,#9c4dcc);color:#fff}
.btn-secondary{background:rgba(255,255,255,.15);color:#fff}
.btn-white{background:#fff;color:var(--primary,#6c3483)}
.theme-b{--bg:#3d0a5a;--primary:#6c3483;--accent:#9c4dcc}
.theme-a{--bg:#3d0a1a;--primary:#7b1a3a;--accent:#a02050}
/* HOME */
.home{padding:16px 0;background:var(--bg,#1a0030);min-height:100vh}
.home h1{text-align:center;font-size:1.9rem;padding:16px 0 8px}
.lvl-toggle{display:flex;gap:8px;justify-content:center;margin:8px 0 12px}
.lvl-btn{padding:10px 20px;border:2px solid rgba(255,255,255,.3);border-radius:12px;background:transparent;color:rgba(255,255,255,.6);cursor:pointer;font-size:.9rem;font-weight:700;transition:all .2s}
.lvl-btn.active{background:#fff;color:var(--primary,#6c3483);border-color:#fff}
.abc-btn{display:block;margin:8px auto 16px;padding:10px 28px;background:rgba(255,255,255,.15);border:none;border-radius:12px;color:#fff;font-size:1rem;cursor:pointer}
.units-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:11px}
.ucard{background:rgba(255,255,255,.1);border-radius:16px;padding:14px 10px;cursor:pointer;text-align:center;transition:all .2s;position:relative}
.ucard:hover{background:rgba(255,255,255,.2);transform:translateY(-2px)}
.ucard-emoji{font-size:2.4rem}
.ucard-title{font-size:.85rem;font-weight:700;margin:6px 0 3px}
.ucard-stars{color:#ffd700;font-size:1rem;letter-spacing:1px}
.ubar{height:5px;background:rgba(255,255,255,.15);border-radius:3px;margin-top:6px;overflow:hidden}
.ubar-fill{height:100%;background:#ffd700;border-radius:3px;transition:width .3s}
.ucheck{position:absolute;top:7px;left:7px;color:#4caf50;font-size:1.1rem;font-weight:700}
.total-bar{text-align:center;padding:14px;font-size:1rem;color:rgba(255,255,255,.8)}
.reset-wrap{text-align:center;padding:6px}
.reset-btn{background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.35);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:.78rem}
.reset-btn:hover{color:rgba(255,255,255,.6);border-color:rgba(255,255,255,.4)}
/* UNIT */
.unit-wrap{padding:12px 0;min-height:100vh;background:var(--bg,#1a0030)}
.unit-hdr{display:flex;align-items:center;gap:10px;padding:12px 0}
.unit-hdr h2{flex:1;font-size:1.2rem}
.back-btn{background:rgba(255,255,255,.15);border:none;color:#fff;padding:8px 13px;border-radius:10px;cursor:pointer;font-size:.95rem}
.tabs{display:flex;gap:6px;margin-bottom:14px}
.tab{flex:1;padding:9px 4px;border:none;border-radius:10px;cursor:pointer;font-size:.85rem;font-weight:700;background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);transition:all .2s}
.tab.active{background:#fff;color:var(--primary,#6c3483)}
/* LEARN */
.fcard{background:rgba(255,255,255,.1);border-radius:18px;padding:22px 16px;text-align:center}
.fc-emoji{font-size:3.8rem;margin-bottom:10px}
.fc-en{font-size:2rem;font-weight:700;direction:ltr;margin-bottom:3px}
.fc-tr{font-size:.88rem;color:rgba(255,255,255,.55);direction:ltr;margin-bottom:10px}
.fc-he{font-size:1.5rem;color:#ffd700;margin:10px 0;animation:fadeIn .3s}
.flip-btn{background:var(--accent,#9c4dcc);color:#fff;border:none;padding:9px 22px;border-radius:11px;cursor:pointer;font-size:.95rem;margin:6px 0}
.speak-btn{background:rgba(255,255,255,.13);border:none;color:#fff;padding:7px 14px;border-radius:9px;cursor:pointer;font-size:1.1rem}
.nav-row{display:flex;align-items:center;justify-content:space-between;margin-top:14px}
.nav-btn{background:rgba(255,255,255,.15);border:none;color:#fff;padding:7px 15px;border-radius:9px;cursor:pointer;font-size:1.1rem}
.nav-btn:disabled{opacity:.25;cursor:default}
.dots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;max-width:200px}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.25)}
.dot.on{background:#ffd700}
/* MATCH */
.match-wrap{text-align:center}
.match-prog{font-size:.85rem;color:rgba(255,255,255,.5);margin-bottom:8px}
.match-prompt{font-size:2.8rem;margin-bottom:6px}
.match-lbl{font-size:1.2rem;color:#ffd700;margin-bottom:14px;min-height:1.6em}
.match-lbl-en{font-size:1.2rem;direction:ltr;margin-bottom:14px;min-height:1.6em}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.opt-btn{padding:13px 8px;border:2px solid rgba(255,255,255,.2);border-radius:12px;background:rgba(255,255,255,.1);color:#fff;cursor:pointer;font-size:.95rem;font-weight:700;transition:all .15s}
.opt-btn:hover:not(:disabled){background:rgba(255,255,255,.2)}
.opt-btn.correct{background:#388e3c!important;border-color:#388e3c!important}
.opt-btn.wrong{background:#c62828!important;border-color:#c62828!important;animation:shake .3s}
/* QUIZ */
.quiz-wrap{text-align:center}
.quiz-prog{font-size:.85rem;color:rgba(255,255,255,.5);margin-bottom:8px}
.quiz-prompt-he{font-size:1.2rem;color:#ffd700;margin-bottom:10px;min-height:1.6em}
.quiz-word{font-size:2.2rem;font-weight:700;direction:ltr;letter-spacing:6px;margin:10px 0 16px}
.quiz-letters{direction:ltr;display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin-bottom:10px}
.lopt{background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.25);color:#fff;width:58px;height:58px;border-radius:12px;font-size:1.7rem;font-weight:700;cursor:pointer;direction:ltr;transition:all .15s}
.lopt:hover:not(:disabled){background:rgba(255,255,255,.25)}
.lopt.correct{background:#388e3c!important;border-color:#388e3c!important}
.lopt.wrong{background:#c62828!important;border-color:#c62828!important;animation:shake .3s}
.sent-opts{display:grid;grid-template-columns:1fr;gap:9px;margin-top:10px}
.sopt{padding:12px 14px;border:2px solid rgba(255,255,255,.2);border-radius:12px;background:rgba(255,255,255,.1);color:#fff;cursor:pointer;font-size:.92rem;text-align:right;transition:all .15s}
.sopt[dir=ltr]{text-align:left}
.sopt:hover:not(:disabled){background:rgba(255,255,255,.2)}
.sopt.correct{background:#388e3c!important;border-color:#388e3c!important}
.sopt.wrong{background:#c62828!important;border-color:#c62828!important;animation:shake .3s}
/* RESULTS */
.results{text-align:center;padding:28px 12px;animation:popIn .4s}
.res-stars{font-size:3rem;color:#ffd700;margin:14px 0}
.res-score{font-size:1.2rem;margin:6px 0}
.res-msg{font-size:1rem;color:rgba(255,255,255,.75);margin:6px 0 20px}
.res-btns{display:flex;gap:9px;justify-content:center;flex-wrap:wrap}
/* ALPHABET */
.alpha-hdr{display:flex;align-items:center;gap:10px;padding:14px 0}
.alpha-hdr h2{font-size:1.2rem}
.alpha-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(95px,1fr));gap:9px}
.lcard{background:rgba(255,255,255,.1);border-radius:13px;padding:10px 7px;text-align:center;cursor:pointer;transition:all .2s}
.lcard:hover{background:rgba(255,255,255,.2)}
.lcard.vowel{background:rgba(255,215,0,.15);border:1.5px solid rgba(255,215,0,.35)}
.lcard.vowel:hover{background:rgba(255,215,0,.25)}
.lcard.pulsing{animation:pulse .35s}
.big-l{font-size:1.75rem;font-weight:700;direction:ltr;color:#ffd700}
.l-emoji{font-size:1.4rem;margin:3px 0}
.l-word{font-size:.76rem;direction:ltr;color:rgba(255,255,255,.9)}
.l-tr{font-size:.7rem;color:rgba(255,255,255,.55);margin-top:2px}
/* READING */
.reading-passages{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:13px}
.psg-btn{padding:7px 13px;border:1.5px solid rgba(255,255,255,.2);border-radius:9px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);cursor:pointer;font-size:.82rem}
.psg-btn.active{border-color:#ffd700;color:#ffd700}
.psg-box{background:rgba(255,255,255,.1);border-radius:15px;padding:18px;margin-bottom:16px}
.psg-title{font-size:1.1rem;font-weight:700;direction:ltr;color:#ffd700;margin-bottom:10px}
.psg-text{direction:ltr;line-height:1.8;font-size:.95rem;color:rgba(255,255,255,.9)}
.rq-prompt{font-size:1.05rem;margin-bottom:12px;font-weight:700}
.rq-opts{display:grid;gap:9px}
.ropt{padding:12px 14px;border:2px solid rgba(255,255,255,.2);border-radius:12px;background:rgba(255,255,255,.1);color:#fff;cursor:pointer;font-size:.92rem;direction:ltr;text-align:left;transition:all .15s}
.ropt:hover:not(:disabled){background:rgba(255,255,255,.2)}
.ropt.correct{background:#388e3c!important;border-color:#388e3c!important}
.ropt.wrong{background:#c62828!important;border-color:#c62828!important;animation:shake .3s}
/* CONFETTI */
.cbox{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;overflow:hidden}
.cp{position:absolute;width:9px;height:9px;border-radius:2px;animation:fall linear forwards}
/* ANIMATIONS */
@keyframes fall{from{top:-15px;opacity:1}to{top:105vh;opacity:0}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>

// ============ HELPERS ============
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function speak(txt,lang='en-US'){if(!window.speechSynthesis)return;const u=new SpeechSynthesisUtterance(txt);u.lang=lang;u.rate=0.8;speechSynthesis.cancel();speechSynthesis.speak(u)}
function getUnits(){return state.level==='beginner'?beginnerUnits:advancedUnits}
function getUnit(id){return getUnits().find(u=>u.id===id)}
function getProg(id){return state.progress[id]||{stars:0,matchDone:false,quizDone:false}}
function setProg(id,key,val){if(!state.progress[id])state.progress[id]={stars:0,matchDone:false,quizDone:false};if(key==='stars')state.progress[id].stars=Math.max(state.progress[id].stars,val);else state.progress[id][key]=val;save()}
function load(){try{const raw=localStorage.getItem('englishApp_v1');state.progress=(raw?JSON.parse(raw):null)||{};if(typeof state.progress!=='object')state.progress={};}catch(e){state.progress={}}}
function save(){localStorage.setItem('englishApp_v1',JSON.stringify({version:1,progress:state.progress}))}
function starsStr(n,max=3){let s='';for(let i=0;i<max;i++)s+=i<n?'★':'☆';return s}
function calcPct(id){const p=getProg(id);return Math.round(((p.matchDone?1:0)+(p.quizDone?1:0)+(p.stars>0?1:0))/3*100)}

function confetti(){
  const b=document.createElement('div');b.className='cbox';
  const cols=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6bff','#ff9f43','#a29bfe'];
  for(let i=0;i<55;i++){const p=document.createElement('div');p.className='cp';p.style.cssText=`left:${Math.random()*100}%;background:${cols[i%cols.length]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;animation-delay:${Math.random()*1.5}s;animation-duration:${2.5+Math.random()*2}s`;b.appendChild(p)}
  document.body.appendChild(b);setTimeout(()=>b.remove(),5000)
}

function buildMatchQs(unit){
  if(unit.mode==='reading')return[];
  return shuffle(unit.words).map(w=>{
    const wrong=shuffle(unit.words.filter(x=>x!==w)).slice(0,3);
    return{word:w,opts:shuffle([w,...wrong])};
  });
}

function buildQuizQs(unit){
  if(unit.mode==='reading')return[];
  return shuffle(unit.words).map(w=>{
    if(unit.mode==='heToEn'&&w.en.length>=3){
      const lets=w.en.toUpperCase().split('');
      const hi=Math.floor(Math.random()*lets.length);
      const cl=lets[hi];
      const wl=shuffle('ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').filter(l=>l!==cl)).slice(0,3);
      return{type:'letter',word:w,hideIdx:hi,correctLetter:cl,letterOpts:shuffle([cl,...wl])};
    }else{
      const wrong=shuffle(unit.words.filter(x=>x!==w)).slice(0,3);
      return{type:'sentence',word:w,opts:shuffle([w,...wrong])};
    }
  });
}

// ============ RENDER ============
function render(){
  const app=document.getElementById('app');
  if(state.screen==='home')app.innerHTML=renderHome();
  else if(state.screen==='unit')app.innerHTML=renderUnit();
  else if(state.screen==='alphabet')app.innerHTML=renderAlphabet();
}

function renderHome(){
  const units=getUnits();
  const tc=state.level==='beginner'?'theme-b':'theme-a';
  const totalStars=Object.values(state.progress).reduce((s,p)=>s+(p.stars||0),0);
  const cards=units.map(u=>{
    const p=getProg(u.id);const pct=calcPct(u.id);
    const done=p.stars>=3&&p.matchDone&&p.quizDone;
    return`<div class="ucard" data-action="openUnit" data-unit-id="${u.id}">
      ${done?'<div class="ucheck">✓</div>':''}
      <div class="ucard-emoji">${u.emoji}</div>
      <div class="ucard-title">${u.title}</div>
      <div class="ucard-stars">${starsStr(p.stars||0)}</div>
      <div class="ubar"><div class="ubar-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
  return`<div class="${tc}">
    <div class="home-header" style="text-align:center;padding:18px 0 8px">
      <h1>🌟 לומדים אנגלית!</h1>
    </div>
    <div class="lvl-toggle">
      <button class="lvl-btn${state.level==='beginner'?' active':''}" data-action="setLevel" data-level="beginner">מתחילים 🌱</button>
      <button class="lvl-btn${state.level==='advanced'?' active':''}" data-action="setLevel" data-level="advanced">מתקדמים 🚀</button>
    </div>
    <div style="text-align:center;margin:8px 0 14px">
      <button class="abc-btn" data-action="openAlphabet">🔤 אלפבית</button>
    </div>
    <div class="units-grid">${cards}</div>
    <div class="total-bar">⭐ סה"כ: ${totalStars} כוכבים</div>
    <div class="reset-wrap"><button class="reset-btn" data-action="resetProgress">🗑️ איפוס כל ההתקדמות</button></div>
  </div>`;
}

function renderUnit(){

  if(!unit)return renderHome();
  const tc=state.level==='beginner'?'theme-b':'theme-a';
  let content='';
  if(state.tab==='learn')content=renderLearn(unit);
  else if(state.tab==='match')content=renderMatch(unit);
  else if(state.tab==='quiz')content=renderQuiz(unit);
  return`<div class="${tc} unit-wrap">
    <div class="unit-hdr">
      <button class="back-btn" data-action="goHome">← חזרה</button>
      <h2>${unit.emoji} ${unit.title}</h2>
    </div>
    <div class="tabs">
      <button class="tab${state.tab==='learn'?' active':''}" data-action="setTab" data-tab="learn">📖 לומדים</button>
      <button class="tab${state.tab==='match'?' active':''}" data-action="setTab" data-tab="match">🎮 משחק</button>
      <button class="tab${state.tab==='quiz'?' active':''}" data-action="setTab" data-tab="quiz">⭐ חידון</button>
    </div>
    <div>${content}</div>
  </div>`;
}

function renderLearn(unit){
  if(unit.mode==='reading'){
    const psg=unit.passages[state.readPsg]||unit.passages[0];
    const btns=unit.passages.map((p,i)=>`<button class="psg-btn${state.readPsg===i?' active':''}" data-action="selectPassage" data-idx="${i}">${p.title}</button>`).join('');
    return`<div>
      <div class="reading-passages">${btns}</div>
      <div class="psg-box">
        <div class="psg-title">${psg.title}</div>
        <div class="psg-text">${psg.text}</div>
      </div>
    </div>`;
  }
  const words=unit.words;
  const w=words[state.cardIndex];
  const dots=words.map((_,i)=>`<div class="dot${i===state.cardIndex?' on':''}"></div>`).join('');
  const showTranslit=w.t&&unit.mode==='heToEn';
  return`<div class="fcard">
    <div class="fc-emoji">${w.e}</div>
    <div class="fc-en" dir="ltr">${w.en}</div>
    ${showTranslit?`<div class="fc-tr">${w.t}</div>`:''}
    ${!state.cardFlipped
      ?`<button class="flip-btn" data-action="flipCard">הצג תרגום 👁️</button>`
      :`<div class="fc-he">${w.he}</div>
       <button class="speak-btn" data-action="speakWord" data-text="${w.en}">🔊</button>`
    }
    <div class="nav-row">
      <button class="nav-btn" data-action="prevCard"${state.cardIndex===0?' disabled':''}>◄</button>
      <div class="dots">${dots}</div>
      <button class="nav-btn" data-action="nextCard"${state.cardIndex===words.length-1?' disabled':''}>►</button>
    </div>
  </div>`;
}

function renderMatch(unit){
  if(unit.mode==='reading'){
    return renderReadingQuiz(unit);
  }
  if(state.matchDone){
    const pct=state.matchScore/state.matchQs.length;
    const stars=pct===1?3:pct>=0.75?2:pct>=0.5?1:0;
    return`<div class="results">
      <div style="font-size:2.5rem">🎮</div>
      <div class="res-stars">${starsStr(stars)}</div>
      <div class="res-score">${state.matchScore} / ${state.matchQs.length} נכון</div>
      <div class="res-msg">${stars===3?'מושלם! 🎉':stars>=2?'כל הכבוד! 👍':'כדאי לתרגל עוד 💪'}</div>
      <div class="res-btns">
        <button class="btn btn-secondary" data-action="setTab" data-tab="match">שחק שוב 🔄</button>
        <button class="btn btn-primary" data-action="setTab" data-tab="quiz">לחידון ⭐</button>
      </div>
    </div>`;
  }
  const q=state.matchQs[state.matchQ];
  if(!q)return'';
  const isEnToHe=unit.mode==='enToHe'||unit.mode==='sentences';
  const optBtns=q.opts.map((o,i)=>`<button class="opt-btn" data-action="matchAnswer" data-idx="${i}" ${isEnToHe?'':'dir="ltr"'}>${isEnToHe?o.he:o.en}</button>`).join('');
  return`<div class="match-wrap">
    <div class="match-prog">${state.matchQ+1} / ${state.matchQs.length}</div>
    <div class="match-prompt">${q.word.e}</div>
    ${isEnToHe
      ?`<div class="match-lbl-en" dir="ltr">${q.word.en}</div>`
      :`<div class="match-lbl">${q.word.he}</div>`
    }
    <div class="opts-grid">${optBtns}</div>
  </div>`;
}

function renderReadingQuiz(unit){
  const psg=unit.passages[state.readPsg]||unit.passages[0];
  if(state.readDone){
    const stars=state.readScore===psg.questions.length?3:state.readScore>=Math.ceil(psg.questions.length*0.67)?2:state.readScore>0?1:0;
    return`<div class="results">
      <div class="res-stars">${starsStr(stars)}</div>
      <div class="res-score">${state.readScore} / ${psg.questions.length} נכון</div>
      <div class="res-msg">${stars===3?'מצוין! 🎉':stars>=2?'יפה מאוד! 👍':'נסה שוב 💪'}</div>
      <div class="res-btns">
        <button class="btn btn-secondary" data-action="startReading">נסה שוב 🔄</button>
      </div>
    </div>`;
  }
  if(state.readQ<0){
    const btns=unit.passages.map((p,i)=>`<button class="psg-btn${state.readPsg===i?' active':''}" data-action="selectPassage" data-idx="${i}">${p.title}</button>`).join('');
    return`<div>
      <div class="reading-passages">${btns}</div>
      <div class="psg-box"><div class="psg-title">${psg.title}</div><div class="psg-text">${psg.text}</div></div>
      <div style="text-align:center;margin-top:16px"><button class="btn btn-primary" data-action="startReading">התחל שאלות ▶</button></div>
    </div>`;
  }
  const q=psg.questions[state.readQ];
  const opts=q.opts.map((o,i)=>`<button class="ropt" data-action="readingAnswer" data-idx="${i}" dir="ltr">${o}</button>`).join('');
  return`<div>
    <div class="match-prog">${state.readQ+1} / ${psg.questions.length}</div>
    <div class="rq-prompt">${q.q}</div>
    <div class="rq-opts">${opts}</div>
  </div>`;
}

function renderQuiz(unit){
  if(unit.mode==='reading')return renderReadingQuiz(unit);
  if(state.quizDone){
    const pct=state.quizScore/state.quizQs.length;
    const stars=pct===1?3:pct>=0.75?2:pct>=0.5?1:0;
    return`<div class="results">
      <div class="res-stars" style="font-size:3.5rem">${starsStr(stars)}</div>
      <div class="res-score">${state.quizScore} / ${state.quizQs.length} נכון</div>
      <div class="res-msg">${stars===3?'מושלם! 🎉🏆':stars>=2?'כל הכבוד! 💪':stars===1?'כמעט! תמשיך לתרגל 📚':'נסה שוב! 💡'}</div>
      <div class="res-btns">
        <button class="btn btn-secondary" data-action="setTab" data-tab="quiz">נסה שוב 🔄</button>
        <button class="btn btn-white" data-action="goHome">לדף הבית 🏠</button>
      </div>
    </div>`;
  }
  const q=state.quizQs[state.quizQ];
  if(!q)return'';
  let body='';
  if(q.type==='letter'){
    const lets=q.word.en.toUpperCase().split('').map((l,i)=>i===q.hideIdx?'_':l).join(' ');
    const lopts=q.letterOpts.map((l,i)=>`<button class="lopt" data-action="quizAnswer" data-idx="${i}">${l}</button>`).join('');
    body=`<div class="quiz-word">${lets}</div>
      <div style="color:rgba(255,255,255,.5);font-size:.85rem;margin-bottom:8px">${q.word.he}</div>
      <div class="quiz-letters">${lopts}</div>`;
  }else{
    const sopts=q.opts.map((o,i)=>`<button class="sopt" data-action="quizAnswer" data-idx="${i}" dir="ltr">${o.en}</button>`).join('');
    body=`<div class="quiz-prompt-he">${q.word.he}</div>
      <div class="sent-opts">${sopts}</div>`;
  }
  return`<div class="quiz-wrap">
    <div class="quiz-prog">${state.quizQ+1} / ${state.quizQs.length}</div>
    ${body}
  </div>`;
}

function renderAlphabet(){
  const cards=alphabet.map(a=>`
    <div class="lcard${vowels.has(a.l)?' vowel':''}" data-action="sayLetter" data-letter="${a.l}" data-word="${a.w}">
      <div class="big-l">${a.l}/${a.l.toLowerCase()}</div>
      <div class="l-emoji">${a.e}</div>
      <div class="l-word">${a.w}</div>
      <div class="l-tr">${a.t}</div>
    </div>`).join('');
  return`<div style="min-height:100vh;background:#1a0030;padding:12px 0">
    <div class="alpha-hdr">
      <button class="back-btn" data-action="goHome">← חזרה</button>
      <h2>🔤 האלפבית האנגלי</h2>
    </div>
    <div style="text-align:center;color:rgba(255,255,255,.5);font-size:.8rem;margin-bottom:12px">אותיות בצהוב = תנועות</div>
    <div class="alpha-grid">${cards}</div>
  </div>`;
}

// ============ ACTIONS ============
document.getElementById('app').addEventListener('click',e=>{
  const el=e.target.closest('[data-action]');
  if(!el)return;
  const d=el.dataset;
  handleAction(d.action,d,el,e);
});

function handleAction(action,d,el,e){
  switch(action){
    case'setLevel':
      state.level=d.level;render();break;
    case'openUnit':{
      const unit=getUnits().find(u=>u.id===d.unitId);
      state.unitId=d.unitId;state.tab='learn';
      state.cardIndex=0;state.cardFlipped=false;
      state.matchQs=buildMatchQs(unit);state.matchQ=0;state.matchScore=0;state.matchDone=false;
      state.quizQs=buildQuizQs(unit);state.quizQ=0;state.quizScore=0;state.quizDone=false;
      state.readPsg=0;state.readQ=-1;state.readScore=0;state.readDone=false;
      state.screen='unit';render();break;}
    case'openAlphabet':state.screen='alphabet';render();break;
    case'goHome':state.screen='home';render();break;
    case'setTab':
      state.tab=d.tab;
      if(d.tab==='match'){const u=getUnit(state.unitId);state.matchQs=buildMatchQs(u);state.matchQ=0;state.matchScore=0;state.matchDone=false;}
      if(d.tab==='quiz'){const u=getUnit(state.unitId);state.quizQs=buildQuizQs(u);state.quizQ=0;state.quizScore=0;state.quizDone=false;}
      if(d.tab==='learn'){state.cardIndex=0;state.cardFlipped=false;}
      render();break;
    case'nextCard':state.cardIndex++;state.cardFlipped=false;render();break;
    case'prevCard':state.cardIndex--;state.cardFlipped=false;render();break;
    case'flipCard':{
      state.cardFlipped=true;
      const w=getUnit(state.unitId).words[state.cardIndex];
      speak(w.en);render();break;}
    case'speakWord':speak(d.text);break;
    case'matchAnswer':handleMatchAnswer(parseInt(d.idx));break;
    case'quizAnswer':handleQuizAnswer(parseInt(d.idx));break;
    case'sayLetter':{
      if(el.closest('.lcard')){el.closest('.lcard').classList.add('pulsing');setTimeout(()=>el.closest('.lcard').classList.remove('pulsing'),400)}
      const u1=new SpeechSynthesisUtterance(d.letter);u1.lang='en-US';u1.rate=0.8;
      speechSynthesis.cancel();speechSynthesis.speak(u1);
      setTimeout(()=>{const u2=new SpeechSynthesisUtterance(d.word);u2.lang='en-US';u2.rate=0.8;speechSynthesis.speak(u2);},900);
      break;}
    case'resetProgress':
      if(confirm('למחוק את כל ההתקדמות? לא ניתן לשחזר.'))
        {localStorage.removeItem('englishApp_v1');state.progress={};state.screen='home';render();}
      break;
    case'selectPassage':
      state.readPsg=parseInt(d.idx);state.readQ=-1;state.readScore=0;state.readDone=false;render();break;
    case'startReading':
      state.readQ=0;state.readScore=0;state.readDone=false;render();break;
    case'readingAnswer':handleReadingAnswer(parseInt(d.idx));break;
  }
}

function handleMatchAnswer(idx){
  const q=state.matchQs[state.matchQ];
  const isCorrect=q.opts[idx]===q.word;
  if(isCorrect)state.matchScore++;
  const btns=document.querySelectorAll('.opt-btn');
  btns.forEach((b,i)=>{
    b.disabled=true;
    if(q.opts[i]===q.word)b.classList.add('correct');
    else if(i===idx)b.classList.add('wrong');
  });
  setTimeout(()=>{
    state.matchQ++;
    if(state.matchQ>=state.matchQs.length){state.matchDone=true;setProg(state.unitId,'matchDone',true);}
    render();
  },900);
}

function handleQuizAnswer(idx){
  const q=state.quizQs[state.quizQ];
  let isCorrect=false;
  if(q.type==='letter'){
    isCorrect=q.letterOpts[idx]===q.correctLetter;
    const btns=document.querySelectorAll('.lopt');
    btns.forEach((b,i)=>{b.disabled=true;if(q.letterOpts[i]===q.correctLetter)b.classList.add('correct');else if(i===idx)b.classList.add('wrong');});
  }else{
    isCorrect=q.opts[idx]===q.word;
    const btns=document.querySelectorAll('.sopt');
    btns.forEach((b,i)=>{b.disabled=true;if(q.opts[i]===q.word)b.classList.add('correct');else if(i===idx)b.classList.add('wrong');});
  }
  if(isCorrect)state.quizScore++;
  setTimeout(()=>{
    state.quizQ++;
    if(state.quizQ>=state.quizQs.length){
      state.quizDone=true;
      const pct=state.quizScore/state.quizQs.length;
      const stars=pct===1?3:pct>=0.75?2:pct>=0.5?1:0;
      setProg(state.unitId,'quizDone',true);
      setProg(state.unitId,'stars',stars);
      if(stars>0)setTimeout(confetti,300);
    }
    render();
  },900);
}

function handleReadingAnswer(idx){
  const unit=getUnit(state.unitId);
  const psg=unit.passages[state.readPsg];
  const q=psg.questions[state.readQ];
  const isCorrect=idx===q.correct;
  if(isCorrect)state.readScore++;
  const btns=document.querySelectorAll('.ropt');
  btns.forEach((b,i)=>{b.disabled=true;if(i===q.correct)b.classList.add('correct');else if(i===idx)b.classList.add('wrong');});
  setTimeout(()=>{
    state.readQ++;
    if(state.readQ>=psg.questions.length){
      state.readDone=true;
      const stars=state.readScore===psg.questions.length?3:state.readScore>=Math.ceil(psg.questions.length*0.67)?2:state.readScore>0?1:0;
      setProg(state.unitId,'quizDone',true);
      setProg(state.unitId,'stars',stars);
      if(stars>0)setTimeout(confetti,300);
    }
    render();
  },900);
}

// ============ INIT ============

// ===== PWA: Inline Service Worker =====
(function() {
  if (!('serviceWorker' in navigator)) return;
  const swCode = `
self.addEventListener('install', e => {
  e.waitUntil(
    caches.open('app-v1').then(c => c.addAll([location.href]))
  );
});
self.addEventListener('fetch', e => {
  e.respondWith(
    caches.match(e.request).then(r => r || fetch(e.request))
  );
});
  `;
  const blob = new Blob([swCode], {type:'text/javascript'});
  const url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(()=>{});
})();

// ===== iOS Safari Fixes =====
// Safe AudioContext init
let audioCtx = null;
function initAudio() {
  if (audioCtx) return;
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
}
document.addEventListener('touchstart', initAudio, {once:true, passive:true});
document.addEventListener('click', initAudio, {once:true});

load();render();
</script>
